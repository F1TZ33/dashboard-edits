<!DOCTYPE html>

<script src="assets/js/app.js"></script>
<script>
const SOP_KEY='bw.sops.custom'; const baseSops=[{name:'Sales Order Process',desc:'Sales order workflow and reference.',link:'sop-sales.html'},{name:'Inventory Procedure',desc:'Inventory checks and handling steps.',link:'sop-inventory.html'}];
function getSops(){try{return JSON.parse(localStorage.getItem(SOP_KEY)||'[]')}catch(e){return []}}
function saveSops(v){localStorage.setItem(SOP_KEY,JSON.stringify(v))}
function renderSops(){const grid=document.getElementById('sopGrid'); grid.innerHTML=''; [...baseSops,...getSops()].forEach(item=>{const art=document.createElement('article'); art.className='editBubble'; art.innerHTML=`<h2><a href="${item.link}" class="bubbleLink">${item.name}</a></h2><p>${item.desc||''}</p>`; grid.appendChild(art);});}
document.addEventListener('DOMContentLoaded', ()=>{renderSops(); const sync=()=>setSopAddVisibility(); sync(); window.addEventListener('focus', sync); document.addEventListener('visibilitychange', sync); setInterval(sync, 1000); document.getElementById('addSopBtn').onclick=()=>openModal('sopAddModal'); document.getElementById('sopAddSave').onclick=()=>{const name=(document.getElementById('sopAddName').value||'').trim(), desc=(document.getElementById('sopAddDesc').value||'').trim(), link=(document.getElementById('sopAddLink').value||'').trim(); if(!name||!link) return alert('Enter a name and link.'); const items=getSops(); items.push({name,desc,link}); saveSops(items); closeModal('sopAddModal'); ['sopAddName','sopAddDesc','sopAddLink'].forEach(id=>document.getElementById(id).value=''); renderSops();};});
</script><script src="assets/js/bw-header.js"></script></body></html>
