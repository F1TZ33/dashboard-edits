<!DOCTYPE html>

<script src="assets/js/app.js"></script>
<script>
const FAQ_KEY='bw.faqs.custom'; const baseFaqs=[{q:'Do we accept AMEX?',a:'No.'},{q:'Can we source non-stock items?',a:'Yes — confirm application and supplier options first.'}];
function getFaqs(){try{return JSON.parse(localStorage.getItem(FAQ_KEY)||'[]')}catch(e){return []}}
function saveFaqs(v){localStorage.setItem(FAQ_KEY,JSON.stringify(v))}
function renderFaqs(){const grid=document.getElementById('faqGrid'); grid.innerHTML=''; [...baseFaqs,...getFaqs()].forEach(item=>{const art=document.createElement('article'); art.className='editBubble'; art.innerHTML=`<h2>${item.q}</h2><p>${item.a}</p>`; grid.appendChild(art);});}
document.addEventListener('DOMContentLoaded', ()=>{renderFaqs(); const sync=()=>setFaqAddVisibility(); sync(); window.addEventListener('focus', sync); document.addEventListener('visibilitychange', sync); setInterval(sync, 1000); document.getElementById('addFaqBtn').onclick=()=>openModal('faqAddModal'); document.getElementById('faqAddSave').onclick=()=>{const q=(document.getElementById('faqAddQ').value||'').trim(), a=(document.getElementById('faqAddA').value||'').trim(); if(!q||!a) return alert('Enter a question and answer.'); const items=getFaqs(); items.push({q,a}); saveFaqs(items); closeModal('faqAddModal'); document.getElementById('faqAddQ').value=''; document.getElementById('faqAddA').value=''; renderFaqs();};});
</script><script src="assets/js/bw-header.js"></script></body></html>
